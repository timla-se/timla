name: Integrate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: integrate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install workspace dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck:frontend

      - name: Build
        run: npm run build:frontend

  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: timla
          POSTGRES_PASSWORD: timla
          POSTGRES_DB: timla
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U timla -d timla"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://timla:timla@localhost:5432/timla
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Apply migrations
        run: alembic upgrade head

      - name: Seed demo data (smoke test)
        run: python scripts/seed.py

      - name: Run tests
        run: pytest --no-header -rN
        working-directory: app
